# Labels-only extraction pipeline
# Re-clones each dataset but only downloads derivatives/ (not the images).
# Images are already in 01_extracted — skip_existing prevents re-extraction.
# Only _seg labels are extracted and paired with existing image PNGs.

work_root: /home/ge.polymtl.ca/p123239/data_work

clone_root: /home/ge.polymtl.ca/p123239/data_work/00_cloned

git_annex: true
git_annex_jobs: 16

# Download everything (images + derivatives) — needed for label matching
# Images already in 01_extracted won't be re-written (skip_existing=true handles img+lbl pairs)
git_annex_exclude:
  - "sourcedata/**"
  - "code/**"

