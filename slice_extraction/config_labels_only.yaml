label_suffix: _seg

# Images already exist — don't re-extract, only extract labels
skip_existing: true

# No split change needed — reuse same seed/ratio as original extraction
train_ratio: 0.999
seed: 28

clip_pct: [0.5, 99.5]
iso_tol: 0.1
workers: 16

# No renumber/tiling needed for labels
renumber: false
tiling: false

resample: false

start_stage: 1
keep_intermediate: false
