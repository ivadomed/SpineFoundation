dino_head:
  out_dim: 65536
  norm_last_layer: true
  loss_weight: 0.6
ibot:
  loss_weight: 1.0
  out_dim: 8192
  norm_last_layer: true
  mask_sample_probability: 0.5
  mask_ratio_min_max:
    - 0.1
    - 0.5
distribution:
  type: 'ddp'
  mixed_precision: bf16
  downcast_bf16: 'no'
train:
  model_name: 'custom_curia_512'
  model_type: 'curia'
  global_batch_size: 164
  max_iterations: 100000
  gradient_checkpointing_enable: false
  clip_grad: 3.0
  freeze_last_layer: 100
  warmup_teacher_temp_iterations: 500
  warmup_iterations: 5000
  teacher_temp: 0.07
  warmup_teacher_temp: 0.04
  freeze_backbone_layers: 6
  momentum_teacher: 0.9992
  centering: 'centering'
  ibot_separate_head: true
  num_workers: 8
  use_pretrained: false
  checkpoint_path: /home/ge.polymtl.ca/p123239/SpineFoundation/curia_model/models--raidium--curia/snapshots/9657dc56276bc6c9503ef6f8d060879c8bee482f
  generate_samples: true
  PCA_component: 3
  student_temp: 0.1
  center_momentum: 0.9
  lr: 7.5e-5
  min_lr: 1e-5
  weight_decay: 0.04
  weight_decay_end: 0.2
  saveckp_freq: 5000
  torch_compile: true
crops:
  global_crops_scale:
    - 0.4
    - 1.0
  local_crops_number: 4
  global_crops_number: 2
  local_crops_scale:
    - 0.25
    - 0.5
  global_crops_size: 512
  local_crops_size: 160

dataset:
  dataset_path: /home/ge.polymtl.ca/p123239/slice_extractor/out_raw_numero
  shuffle: true
  size: 512

output_folders:
  train_checkpoint_dir: train_checkpoints
  teacher_checkpoint_dir: teacher_checkpoints
  training_samples_dir: training_samples
  training_results_dir: training_results
  log_dir: log_files
  main_output: outputs_curia
