dino_head:
  out_dim: 16384
  norm_last_layer: true
  loss_weight: 0.6
ibot:
  loss_weight: 1.0
  out_dim: 4096
  norm_last_layer: true
  mask_sample_probability: 0.5
  mask_ratio_min_max:
    - 0.1
    - 0.3
distribution:
  type: 'ddp'
  mixed_precision: bf16
  downcast_bf16: 'no'
train:
  model_name: 'custom_1024_stretch'
  model_type: 'curia_1024'
  global_batch_size: 32
  max_iterations: 100000
  gradient_checkpointing_enable: false
  clip_grad: 3.0
  freeze_last_layer: 100
  warmup_teacher_temp_iterations: 500
  warmup_iterations: 10000
  teacher_temp: 0.07
  warmup_teacher_temp: 0.04
  freeze_backbone_layers: 0
  momentum_teacher: 0.9992
  centering: 'centering'
  ibot_separate_head: true
  num_workers: 8
  use_pretrained: false
  generate_samples: true
  PCA_component: 3
  student_temp: 0.1
  center_momentum: 0.9
  lr: 2e-4
  min_lr: 1e-5
  weight_decay: 0.04
  weight_decay_end: 0.2
  saveckp_freq: 5000
  torch_compile: true
crops:
  global_crops_scale:
    - 0.4
    - 1.0
  local_crops_number: 4
  global_crops_number: 2
  local_crops_scale:
    - 0.25
    - 0.5
  global_crops_size: 1024
  local_crops_size: 384

dataset:
  dataset_path: /home/ge.polymtl.ca/p123239/data_work/01_extracted/image
  shuffle: true
  size: 1024
  stretch: true

output_folders:
  train_checkpoint_dir: train_checkpoints
  teacher_checkpoint_dir: teacher_checkpoints
  training_samples_dir: training_samples
  training_results_dir: training_results
  log_dir: log_files
  main_output: outputs_1024_stretch
